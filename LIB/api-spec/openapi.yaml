openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: skills
    description: SagaPad skill generation endpoints
  - name: telegram
    description: Telegram bot webhook
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /skills/hackathon-playbook:
    post:
      operationId: generateHackathonPlaybook
      tags: [skills]
      summary: Generate a hackathon social playbook
      description: Takes project details and returns a full 4-week X social strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HackathonPlaybookInput"
      responses:
        "200":
          description: Generated playbook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillOutput"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /skills/founder-brand:
    post:
      operationId: generateFounderBrand
      tags: [skills]
      summary: Generate a founder personal brand playbook
      description: Takes founder details and returns a full personal brand strategy for X
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FounderBrandInput"
      responses:
        "200":
          description: Generated playbook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillOutput"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /skills/generations:
    get:
      operationId: listGenerations
      tags: [skills]
      summary: List recent skill generations
      responses:
        "200":
          description: List of recent generations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Generation"

  /telegram/webhook:
    post:
      operationId: telegramWebhook
      tags: [telegram]
      summary: Telegram bot webhook receiver
      description: Receives updates from Telegram and processes skill commands
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramWebhookResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    HackathonPlaybookInput:
      type: object
      properties:
        projectName:
          type: string
        description:
          type: string
        targetAudience:
          type: string
        techStack:
          type: string
        teamBackground:
          type: ["string", "null"]
      required:
        - projectName
        - description
        - targetAudience
        - techStack

    FounderBrandInput:
      type: object
      properties:
        founderName:
          type: string
        whatBuilding:
          type: string
        background:
          type: string
        focusArea:
          type: string
        communicationStyle:
          type: string
      required:
        - founderName
        - whatBuilding
        - background
        - focusArea
        - communicationStyle

    SkillOutput:
      type: object
      properties:
        id:
          type: integer
        skillType:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - skillType
        - content
        - createdAt

    Generation:
      type: object
      properties:
        id:
          type: integer
        skillType:
          type: string
        inputSummary:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - skillType
        - inputSummary
        - createdAt

    TelegramUpdate:
      type: object
      properties:
        update_id:
          type: integer
        message:
          type: object
          properties:
            message_id:
              type: integer
            text:
              type: ["string", "null"]
            chat:
              type: object
              properties:
                id:
                  type: integer
              required:
                - id
          required:
            - message_id
            - chat
      required:
        - update_id

    TelegramWebhookResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
